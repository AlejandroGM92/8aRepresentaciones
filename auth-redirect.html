<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .msg { text-align: center; color: #555; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #910909; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="msg">
    <div class="spinner"></div>
    <p id="statusMsg">Procesando autenticación...</p>
</div>
<script>
(async () => {
    function redirigir(data) {
        // Si el usuario tiene 2FA activo, redirigir al login con el temp_token
        if (data.require_2fa) {
            sessionStorage.setItem('oauth_temp_token', data.temp_token);
            window.location.href = '/login.html?require_2fa=1';
            return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('actor', JSON.stringify(data.actor));
        if (data.actor.is_admin) {
            window.location.href = '/admin.html';
        } else if (data.actor.is_casting) {
            window.location.href = '/casting.html';
        } else if (data.perfil_completo) {
            window.location.href = '/perfil.html';
        } else {
            window.location.href = '/completar-perfil.html';
        }
    }

    // ── GOOGLE: id_token viene en el hash (#) ──
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const idToken = hash.get('id_token');

    if (idToken) {
        document.getElementById('statusMsg').textContent = 'Iniciando sesión con Google...';
        try {
            const res = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: idToken })
            });
            const data = await res.json();
            sessionStorage.removeItem('google_nonce');
            sessionStorage.removeItem('google_provider');
            if (res.ok) {
                redirigir(data);
            } else {
                alert(data.error || 'Error al iniciar sesión con Google');
                window.location.href = '/login.html';
            }
        } catch (e) {
            console.error('Error Google auth-redirect:', e);
            alert('Error de conexión con Google. Intenta de nuevo.');
            window.location.href = '/login.html';
        }
        return;
    }

    // ── MICROSOFT: authorization code viene en query (?) ──
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error || !code) {
        console.error('Error OAuth:', error, params.get('error_description'));
        window.location.href = '/login.html';
        return;
    }

    document.getElementById('statusMsg').textContent = 'Iniciando sesión con Microsoft...';

    const codeVerifier = sessionStorage.getItem('ms_pkce_verifier');
    const clientId = sessionStorage.getItem('ms_client_id');
    const redirectUri = window.location.origin + '/auth-redirect.html';

    if (!codeVerifier) {
        alert('Sesión expirada. Intenta de nuevo.');
        window.location.href = '/login.html';
        return;
    }

    try {
        const tokenRes = await fetch('https://login.microsoftonline.com/common/oauth2/v2.0/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                client_id: clientId,
                grant_type: 'authorization_code',
                code,
                redirect_uri: redirectUri,
                code_verifier: codeVerifier
            })
        });

        const tokenData = await tokenRes.json();

        if (!tokenData.access_token) {
            console.error('Error al obtener token Microsoft:', tokenData);
            alert('Error al autenticar con Microsoft. Intenta de nuevo.');
            window.location.href = '/login.html';
            return;
        }

        const res = await fetch('/api/auth/microsoft', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: tokenData.access_token })
        });
        const data = await res.json();

        sessionStorage.removeItem('ms_pkce_verifier');
        sessionStorage.removeItem('ms_client_id');

        if (res.ok) {
            redirigir(data);
        } else {
            alert(data.error || 'Error al iniciar sesión con Microsoft');
            window.location.href = '/login.html';
        }

    } catch (e) {
        console.error('Error en auth-redirect Microsoft:', e);
        alert('Error de conexión. Intenta de nuevo.');
        window.location.href = '/login.html';
    }
})();
</script>
</body>
</html>
