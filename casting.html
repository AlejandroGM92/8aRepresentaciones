<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Casting - 8a Representaciones</title>
    <link rel="stylesheet" href="estilos/style-admin.css">
    <style>
        .nav-title { color: #555; }
        .casting-badge {
            background: linear-gradient(135deg, #910909, #c92a2a);
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="imagenes/LOGO 8A ROJO-SIN FONDO.png" alt="8a Representaciones">
            </div>
            <div class="nav-title">Portal Director de Casting</div>
            <div style="flex:1"></div>
            <span class="casting-badge">Director de Casting</span>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menú">☰</button>
            <div class="nav-actions" id="navMenu">
                <a href="#" class="nav-link nav-link-btn" id="btnCerrarSesion">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">

        <!-- Filtros -->
        <div class="filters-card">
            <h2>Buscar Actores</h2>
            <form id="formFiltros">
                <div class="filters-grid">
                    <div class="form-group">
                        <label for="filtroNombre">Nombre</label>
                        <input type="text" id="filtroNombre" placeholder="Buscar por nombre...">
                    </div>
                    <div class="form-group">
                        <label for="filtroHabilidades">Habilidad especial</label>
                        <input type="text" id="filtroHabilidades" placeholder="Ej: canto, baile...">
                    </div>
                    <div class="form-group">
                        <label for="filtroIdioma">Idioma</label>
                        <select id="filtroIdioma">
                            <option value="">Todos</option>
                            <option value="Español">Español</option>
                            <option value="Inglés">Inglés</option>
                            <option value="Francés">Francés</option>
                            <option value="Alemán">Alemán</option>
                            <option value="Italiano">Italiano</option>
                            <option value="Portugués">Portugués</option>
                            <option value="Chino">Chino</option>
                            <option value="Japonés">Japonés</option>
                            <option value="Árabe">Árabe</option>
                            <option value="Ruso">Ruso</option>
                            <option value="Coreano">Coreano</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filtroNivelIdioma">Nivel de idioma</label>
                        <select id="filtroNivelIdioma">
                            <option value="">Todos los niveles</option>
                            <option value="A1">A1 - Principiante</option>
                            <option value="A2">A2 - Elemental</option>
                            <option value="B1">B1 - Intermedio</option>
                            <option value="B2">B2 - Intermedio Alto</option>
                            <option value="C1">C1 - Avanzado</option>
                            <option value="C2">C2 - Dominio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filtroAniosExp">Años de experiencia</label>
                        <select id="filtroAniosExp">
                            <option value="">Todos</option>
                            <option value="menos_1">Menos de 1 año</option>
                            <option value="1">1 año</option>
                            <option value="2">2 años</option>
                            <option value="3">3 años</option>
                            <option value="5">5 años</option>
                            <option value="mas_5">Más de 5 años</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filtroEdadAparente">Edad aparente del personaje</label>
                        <input type="number" id="filtroEdadAparente" placeholder="Ej: 30" min="1" max="99">
                    </div>
                    <div class="form-group">
                        <label for="filtroEscenasSexo">Escenas de sexo</label>
                        <select id="filtroEscenasSexo">
                            <option value="">Todos</option>
                            <option value="1">Sí hace</option>
                            <option value="0">No hace</option>
                        </select>
                    </div>
                    <div class="form-group edad-group">
                        <label>Altura (cm)</label>
                        <div class="edad-inputs">
                            <input type="number" id="filtroAlturaMin" placeholder="Mín" min="100" max="250">
                            <span>–</span>
                            <input type="number" id="filtroAlturaMax" placeholder="Máx" min="100" max="250">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="filtroColorOjos">Color de ojos</label>
                        <input type="text" id="filtroColorOjos" placeholder="Ej: café, negro...">
                    </div>
                    <div class="form-group">
                        <label for="filtroColorCabello">Color de cabello</label>
                        <input type="text" id="filtroColorCabello" placeholder="Ej: negro, rubio...">
                    </div>
                    <div class="form-group edad-group">
                        <label>Edad real</label>
                        <div class="edad-inputs">
                            <input type="number" id="filtroEdadMin" placeholder="Mín" min="0" max="99">
                            <span>–</span>
                            <input type="number" id="filtroEdadMax" placeholder="Máx" min="0" max="99">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="filtroPais">País de nacimiento</label>
                        <select id="filtroPais">
                            <option value="">Todos</option>
                            <option value="Colombia">Colombia</option>
                            <option value="México">México</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Chile">Chile</option>
                            <option value="Perú">Perú</option>
                            <option value="Venezuela">Venezuela</option>
                            <option value="Ecuador">Ecuador</option>
                            <option value="Bolivia">Bolivia</option>
                            <option value="Paraguay">Paraguay</option>
                            <option value="Uruguay">Uruguay</option>
                            <option value="Brasil">Brasil</option>
                            <option value="España">España</option>
                            <option value="Estados Unidos">Estados Unidos</option>
                            <option value="Costa Rica">Costa Rica</option>
                            <option value="Panamá">Panamá</option>
                            <option value="Guatemala">Guatemala</option>
                            <option value="Honduras">Honduras</option>
                            <option value="Nicaragua">Nicaragua</option>
                            <option value="El Salvador">El Salvador</option>
                            <option value="República Dominicana">República Dominicana</option>
                            <option value="Cuba">Cuba</option>
                            <option value="Puerto Rico">Puerto Rico</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filtroCiudad">Ciudad de nacimiento</label>
                        <input type="text" id="filtroCiudad" placeholder="Ej: Bogotá, Medellín...">
                    </div>
                    <div class="form-group">
                        <label for="filtroAcento">Acento que maneja</label>
                        <select id="filtroAcento">
                            <option value="">Todos los acentos</option>
                            <option value="Español neutro (Latinoamérica)">Español neutro (Latinoamérica)</option>
                            <option value="Mexicano">Mexicano</option>
                            <option value="Colombiano (bogotano/neutro)">Colombiano (bogotano/neutro)</option>
                            <option value="Paisa (antioqueño)">Paisa (antioqueño)</option>
                            <option value="Costeño (colombiano)">Costeño (colombiano)</option>
                            <option value="Caleño">Caleño</option>
                            <option value="Venezolano">Venezolano</option>
                            <option value="Argentino / Rioplatense">Argentino / Rioplatense</option>
                            <option value="Chileno">Chileno</option>
                            <option value="Peruano">Peruano</option>
                            <option value="Cubano">Cubano</option>
                            <option value="Puertorriqueño">Puertorriqueño</option>
                            <option value="Dominicano">Dominicano</option>
                            <option value="Guatemalteco">Guatemalteco</option>
                            <option value="Ecuatoriano">Ecuatoriano</option>
                            <option value="Boliviano">Boliviano</option>
                            <option value="Paraguayo">Paraguayo</option>
                            <option value="Uruguayo">Uruguayo</option>
                            <option value="Hondureño">Hondureño</option>
                            <option value="Salvadoreño">Salvadoreño</option>
                            <option value="Nicaragüense">Nicaragüense</option>
                            <option value="Costarricense">Costarricense</option>
                            <option value="Panameño">Panameño</option>
                            <option value="Español peninsular (castellano)">Español peninsular (castellano)</option>
                            <option value="Andaluz">Andaluz</option>
                            <option value="Canario">Canario</option>
                            <option value="Americano (inglés)">Americano (inglés)</option>
                            <option value="Británico (inglés)">Británico (inglés)</option>
                            <option value="Francés">Francés</option>
                            <option value="Italiano">Italiano</option>
                            <option value="Portugués / Brasileño">Portugués / Brasileño</option>
                            <option value="Alemán">Alemán</option>
                            <option value="Ruso">Ruso</option>
                            <option value="Japonés">Japonés</option>
                            <option value="Chino">Chino</option>
                        </select>
                    </div>
                </div>
                <div class="filters-actions">
                    <button type="submit" class="btn-primary">Buscar</button>
                    <button type="button" class="btn-secondary" id="btnLimpiarFiltros">Limpiar</button>
                </div>
            </form>
        </div>

        <!-- Contador -->
        <div class="stats-bar">
            <span id="contadorActores">Cargando...</span>
        </div>

        <!-- Grid de actores -->
        <div id="actoresGrid" class="actors-grid">
            <div class="loading-state">Cargando actores...</div>
        </div>
    </div>

    <!-- Modal ver perfil (solo lectura) -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Modal confirmar logout -->
    <div id="logoutOverlay" class="modal-overlay" style="display:none;">
        <div class="modal modal-sm">
            <div class="logout-modal-body">
                <div class="logout-icon">🚪</div>
                <h3>Cerrar Sesión</h3>
                <p>¿Estás seguro de que deseas cerrar sesión?</p>
            </div>
            <div class="modal-actions" style="padding:15px 25px 25px;">
                <button class="btn-secondary" id="btnCancelarLogout">Cancelar</button>
                <button class="btn-danger" id="btnConfirmarLogout">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="funcionalidad/casting.js"></script>
</body>
</html>
