<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - 8a Representaciones</title>
    <link rel="stylesheet" href="estilos/style-login.css">
    <style>
        .forgot-card {
            background: #fff;
            border-radius: 20px;
            padding: 44px 40px 36px;
            box-shadow: 0 8px 40px rgba(0,0,0,.18);
            width: 100%;
            max-width: 420px;
        }
        .forgot-logo { text-align: center; margin-bottom: 28px; }
        .forgot-logo img { height: 70px; }
        .forgot-card h2 { text-align: center; color: #910909; margin: 0 0 8px; font-size: 22px; font-weight: 700; }
        .forgot-card .desc { text-align: center; color: #777; font-size: 14px; margin: 0 0 28px; line-height: 1.6; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid #ddd; border-radius: 10px;
            font-size: 15px; box-sizing: border-box;
            outline: none; transition: border .2s;
        }
        .form-group input:focus { border-color: #910909; }
        .form-group input.input-ok  { border-color: #1d6f42; }
        .form-group input.input-err { border-color: #c0392b; }
        .email-hint { font-size: 12px; margin-top: 5px; min-height: 16px; }
        .email-hint.ok  { color: #1d6f42; }
        .email-hint.err { color: #c0392b; }
        .btn-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #910909, #c92a2a);
            color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: opacity .2s; margin-top: 4px;
        }
        .btn-submit:hover { opacity: .88; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
        .msg {
            text-align: center; font-size: 14px; margin-top: 16px;
            padding: 11px 16px; border-radius: 9px; display: none; line-height: 1.5;
        }
        .msg.success { background: #d4edda; color: #1d6f42; display: block; }
        .msg.error   { background: #f8d7da; color: #721c24; display: block; }
        .back-link { text-align: center; margin-top: 22px; font-size: 13px; }
        .back-link a { color: #910909; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
        .icon-wrap { text-align: center; margin-bottom: 16px; font-size: 44px; }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="forgot-logo">
            <img src="imagenes/LOGO 8A ROJO-SIN FONDO.png" alt="8a Representaciones">
        </div>
        <div class="icon-wrap">🔑</div>
        <h2>Recuperar contraseña</h2>
        <p class="desc">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

        <div id="formForgot">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
                <div class="email-hint" id="emailHint"></div>
            </div>
            <button class="btn-submit" id="btnEnviar" disabled>Enviar enlace de recuperación</button>
        </div>

        <div id="msgForgot" class="msg"></div>
        <div class="back-link"><a href="login.html">← Volver al inicio de sesión</a></div>
    </div>

    <script>
        const API_URL = '/api';

        const btn      = document.getElementById('btnEnviar');
        const msg      = document.getElementById('msgForgot');
        const emailEl  = document.getElementById('email');
        const hintEl   = document.getElementById('emailHint');

        const RE_EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function validarEmail(valor) {
            return RE_EMAIL.test(valor.trim());
        }

        // Validación en tiempo real
        emailEl.addEventListener('input', () => {
            const val = emailEl.value.trim();
            msg.className = 'msg'; // ocultar mensaje previo

            if (val === '') {
                emailEl.className = '';
                hintEl.textContent = '';
                hintEl.className = 'email-hint';
                btn.disabled = true;
                return;
            }

            if (validarEmail(val)) {
                emailEl.className = 'input-ok';
                hintEl.textContent = '✓ Correo válido';
                hintEl.className = 'email-hint ok';
                btn.disabled = false;
            } else {
                emailEl.className = 'input-err';
                hintEl.textContent = 'Ingresa un correo válido (ej: nombre@correo.com)';
                hintEl.className = 'email-hint err';
                btn.disabled = true;
            }
        });

        // Enviar con Enter
        emailEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !btn.disabled) btn.click();
        });

        btn.addEventListener('click', async () => {
            const email = emailEl.value.trim();
            msg.className = 'msg';

            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    msg.textContent = '✓ Correo enviado. Revisa tu bandeja de entrada (y la carpeta de spam).';
                    msg.className = 'msg success';
                    document.getElementById('formForgot').style.display = 'none';
                } else {
                    // Correo no encontrado u otro error
                    msg.textContent = data.error || 'No se pudo enviar el correo. Intenta de nuevo.';
                    msg.className = 'msg error';
                    emailEl.className = 'input-err';
                    btn.disabled = false;
                    btn.textContent = 'Enviar enlace de recuperación';
                }
            } catch {
                msg.textContent = 'Error de conexión. Intenta de nuevo.';
                msg.className = 'msg error';
                btn.disabled = false;
                btn.textContent = 'Enviar enlace de recuperación';
            }
        });
    </script>
</body>
</html>
