<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - 8a Representaciones</title>
    <link rel="stylesheet" href="estilos/style.css">
    <style>
        .reset-wrap { max-width: 420px; margin: 80px auto; padding: 0 16px; }
        .reset-card { background: #fff; border-radius: 16px; padding: 40px 36px; box-shadow: 0 4px 24px rgba(0,0,0,.10); }
        .reset-logo { text-align: center; margin-bottom: 24px; }
        .reset-logo img { height: 60px; }
        .reset-card h2 { text-align: center; color: #910909; margin: 0 0 6px; font-size: 22px; }
        .reset-card p { text-align: center; color: #777; font-size: 14px; margin: 0 0 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 9px; font-size: 14px; box-sizing: border-box; outline: none; transition: border .2s; }
        .form-group input:focus { border-color: #910909; }
        .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg,#910909,#c92a2a); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity .2s; }
        .btn-submit:hover { opacity: .9; }
        .msg { text-align: center; font-size: 14px; margin-top: 14px; padding: 10px 14px; border-radius: 8px; display: none; }
        .msg.success { background: #d4edda; color: #1d6f42; display: block; }
        .msg.error   { background: #f8d7da; color: #721c24; display: block; }
        .back-link { text-align: center; margin-top: 18px; font-size: 13px; }
        .back-link a { color: #910909; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="reset-wrap">
        <div class="reset-card">
            <div class="reset-logo">
                <img src="imagenes/LOGO 8A ROJO-SIN FONDO.png" alt="8a Representaciones">
            </div>
            <h2>Restablecer contraseña</h2>
            <p id="subtitulo">Ingresa tu nueva contraseña.</p>

            <div id="formReset">
                <div class="form-group">
                    <label for="nuevaPass">Nueva contraseña</label>
                    <input type="password" id="nuevaPass" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirmarPass">Confirmar contraseña</label>
                    <input type="password" id="confirmarPass" placeholder="Repite la contraseña">
                </div>
                <button class="btn-submit" id="btnReset">Restablecer contraseña</button>
            </div>

            <div id="msgReset" class="msg"></div>
            <div class="back-link"><a href="login.html">← Volver al inicio de sesión</a></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Verificar que venga con token en la URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('subtitulo').textContent = 'Enlace inválido o expirado.';
            document.getElementById('formReset').style.display = 'none';
        }

        document.getElementById('btnReset').addEventListener('click', async () => {
            const pass = document.getElementById('nuevaPass').value;
            const confirm = document.getElementById('confirmarPass').value;
            const msg = document.getElementById('msgReset');
            msg.className = 'msg';

            if (!pass || pass.length < 6) {
                msg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                msg.className = 'msg error';
                return;
            }
            if (pass !== confirm) {
                msg.textContent = 'Las contraseñas no coinciden.';
                msg.className = 'msg error';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = 'Contraseña actualizada. Redirigiendo...';
                    msg.className = 'msg success';
                    document.getElementById('formReset').style.display = 'none';
                    setTimeout(() => window.location.href = 'login.html', 2500);
                } else {
                    msg.textContent = data.error || 'Error al restablecer la contraseña.';
                    msg.className = 'msg error';
                }
            } catch {
                msg.textContent = 'Error de conexión. Intenta de nuevo.';
                msg.className = 'msg error';
            }
        });
    </script>
</body>
</html>
