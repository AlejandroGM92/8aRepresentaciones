<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Perfil Actor - 8a Representaciones</title>
    <link rel="stylesheet" href="estilos/style-admin.css">
    <link rel="stylesheet" href="estilos/style-perfil.css">
    <style>
        .container { max-width: 900px; }
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin: 30px 0;
        }
        .form-actions a {
            padding: 12px 30px;
            border: 2px solid #910909;
            border-radius: 10px;
            color: #910909;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
        }
        .form-actions a:hover { background: #910909; color: white; }
        .page-loading {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            font-size: 16px;
        }
        .password-reset-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .password-reset-group .form-group { flex: 1; margin-bottom: 0; }
        .password-reset-group button {
            padding: 12px 18px;
            white-space: nowrap;
            font-size: 13px;
        }
        /* Foto galería en form */
        .galeria-form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .galeria-form-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .galeria-form-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .galeria-form-item .btn-del-galeria {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,71,87,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .galeria-form-item .btn-del-galeria:hover { background: #e03040; }
        .upload-foto-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border: 2px dashed #ccc;
            border-radius: 10px;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .upload-foto-btn:hover { border-color: #910909; color: #910909; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="imagenes/LOGO 8A ROJO-SIN FONDO.png" alt="8a Representaciones">
            </div>
            <div class="nav-title" id="navTitle">Nuevo Actor</div>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menú">☰</button>
            <div class="nav-actions" id="navMenu">
                <a href="admin.html" class="nav-link nav-link-btn">← Volver al Panel</a>
                <a href="#" class="nav-link nav-link-btn" id="btnCerrarSesion">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container" id="mainContent">
        <div class="page-loading" id="loadingState">Cargando...</div>
    </div>

    <div id="notification" class="notification"></div>

    <!-- Modal confirmar logout -->
    <div id="logoutOverlay" class="modal-overlay" style="display:none;">
        <div class="modal modal-sm">
            <div class="logout-modal-body">
                <div class="logout-icon">🚪</div>
                <h3>Cerrar Sesión</h3>
                <p>¿Estás seguro de que deseas cerrar sesión?</p>
            </div>
            <div class="modal-actions" style="padding:15px 25px 25px;">
                <button class="btn-secondary" id="btnCancelarLogout">Cancelar</button>
                <button class="btn-danger" id="btnConfirmarLogout">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <script src="funcionalidad/admin-actor-form.js"></script>
</body>
</html>
